site_name: clean-up
site_url: https://dorkyrobot.com/clean-up/
site_description: Interactive CLI to reclaim disk space from project build artifacts and caches.
site_author: Dorky-Robot

repo_url: https://github.com/Dorky-Robot/clean-up
repo_name: Dorky-Robot/clean-up
edit_uri: edit/main/docs/

theme:
  name: material
  font: false
  palette:
    scheme: slate
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - search.highlight
    - content.code.copy
    - toc.follow

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Usage: usage.md
  - Supported Projects: supported-projects.md

extra_css:
  - assets/css/dorkyrobot-theme.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Dorky-Robot/clean-up
